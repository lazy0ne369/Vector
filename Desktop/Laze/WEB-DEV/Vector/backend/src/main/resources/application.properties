# ================================
# Vector Backend Configuration
# ================================

# Application
spring.application.name=vector-backend
server.port=8080

# ================================
# MySQL Database Configuration
# ================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/vector_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================
# JPA / Hibernate
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ================================
# JWT Configuration
# ================================
# Base64-encoded secret key (at least 256 bits for HS256)
jwt.secret=${JWT_SECRET:VmVjdG9yQXBwU2VjcmV0S2V5Rm9ySldUVG9rZW5HZW5lcmF0aW9uQW5kVmFsaWRhdGlvbjIwMjRWZXJ5TG9uZ1NlY3JldEtleQ==}
jwt.expiration=86400000

# ================================
# CORS Configuration
# ================================
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175}

# ================================
# Logging
# ================================
logging.level.org.springframework.security=DEBUG
logging.level.com.vector=DEBUG
